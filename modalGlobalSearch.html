<!-- [UI BLOCK: MASTER GLOBAL SEARCH MODAL] -->
<div id="globalSearchModal" class="modal-overlay-gahar" style="display:none;">
  <div class="search-modal-content">
    <h3><i class="fa-solid fa-layer-group"></i> Master Global Search</h3>
    
    <div class="search-input-wrapper">
      <i class="fa-solid fa-magnifying-glass search-icon-inside"></i>
      <input type="text" id="masterSearchInput" 
       onkeyup="liveSearchRAM(this.value)" 
       placeholder="Ketik ID, Nama, atau Lokasi Aset..." 
       class="input-search-neon">

    </div>

    <div class="table-responsive-aset scroll-dark-mini" style="max-height:350px; margin-bottom: 20px;">
      <table id="globalResultTable" class="tabel-main-content">
        <thead>
          <tr>
          <th style="width: 20px; min-width: 20px; text-align: center;">SEL</th>
          <th style="width: 35px; min-width: 40px;">TIPE</th>
          <th style="width: 20px; min-width: 20px;">ID</th>
          <th style="min-width: 100px;">NAMA ASET/ LOKASI</th>
          </tr>
        </thead>
        <tbody id="globalResultBody">
          <!-- Hasil filter akan muncul di sini -->
        </tbody>
      </table>
    </div>

    <div class="modal-footer-action">
      <button onclick="navigateAsset()" class="btn-aktif-neon btn-green-neon">
        <i class="fa-solid fa-location-crosshairs"></i> PROSES
      </button>
      <button onclick="closeGlobalSearch()" class="btn-nonaktif-neon btn-grey-dark">
        <i class="fa-solid fa-xmark"></i> BATAL
      </button>
    </div>
  </div>
</div>
