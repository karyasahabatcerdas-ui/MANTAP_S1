<script>
  const DEV_ID = "AKfycbyFNgkGp2pIC6VLym5APcXbxwg8j0bHQ4KaIytsZDU"; 
  const PROD_ID = "AKfycbyWdb0Hi1MeK7YmoKGQ6XnvtRTF2fK_IUq65_Ivqc3Wl_d5rk1WV_nVwM0EKGiazqsV";
  const MY_GAS_TOKEN = "ya29.a0Aa7MYiqeSVLX-8h7nwalBGDl88Uo4dfEUUpY55Dmcsg2W64qMI_zqBUNuOersvcNljqfw3rF9VpYkzG8lG5veztdhVbkd907PNYJu24E-qRAtNjW3XIt9DfDv4LEQFF7SURRtGjTlXc8uMfadNJZPELvuaOgGRBZo3T5D5SQG554nFK-Fpd7pgCwYLXhg6bMKMU7TtKuaCgYKAf4SARISFQHGX2MiKj1zhD1iwLxoqnfryA7Jzg0207" ;


  // DETEKSI 1: Cek URL apakah ada ?debug=true atau ?mode=dev
  const urlParams = new URLSearchParams(window.location.search);
  const isDebugQuery = urlParams.get('debug') === 'true' || urlParams.get('mode') === 'dev';

  // DETEKSI 2: Cek apakah di Localhost atau File
  const isLocal = window.location.hostname === "localhost" || 
                  window.location.hostname === "127.0.0.1" || 
                  window.location.protocol === "file:";

  // PENENTUAN MODE: Jika salah satu terpenuhi, masuk mode DEV
  const isDevMode = isLocal || isDebugQuery;

  var APPSCRIPT_ID = isDevMode ? DEV_ID : PROD_ID;
  var SUFFIX = isDevMode ? "/dev" : "/exec";
  if (isDevMode){
    var APPSCRIPT_URL = "https://script.google.com/macros/s/" + APPSCRIPT_ID + SUFFIX + "?access_token=" + MY_GAS_TOKEN ;
  } else {
    var APPSCRIPT_URL = "https://script.google.com/macros/s/" + APPSCRIPT_ID + SUFFIX
  }   

  console.log("🛠️ Mode: " + (isDevMode ? "DEVELOPMENT" : "PRODUCTION"));
  console.log("🔗 URL: " + APPSCRIPT_URL);
</script>
